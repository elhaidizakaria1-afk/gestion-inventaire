services:
  - type: web
    name: gestion-inventaire
    runtime: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: APP_ENV
        value: production
      - key: ADMIN_LOGIN
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DB_HOST
        value: mysql
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        fromService:
          type: pserv
          name: mysql
          envVarKey: MYSQL_DATABASE
      - key: DB_USER
        fromService:
          type: pserv
          name: mysql
          envVarKey: MYSQL_USER
      - key: DB_PASS
        fromService:
          type: pserv
          name: mysql
          envVarKey: MYSQL_PASSWORD
      - key: DB_CHARSET
        value: utf8mb4

  - type: pserv
    name: mysql
    runtime: image
    plan: starter
    image:
      url: docker.io/mysql:8.0
    envVars:
      - key: MYSQL_DATABASE
        value: gestion_inventaire
      - key: MYSQL_USER
        value: stock_user
      - key: MYSQL_PASSWORD
        generateValue: true
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 10
